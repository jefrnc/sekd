version: 2

project_name: sekd

before:
  hooks:
    - go mod tidy

builds:
  - main: ./main.go
    binary: sekd
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/jefrnc/sekd/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: jefrnc
      name: homebrew-sekd
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/jefrnc/sekd"
    description: "Day-trading due diligence in your terminal — SEC filings, dilution risk, and AI extraction"
    license: "MIT"
    install: |
      bin.install "sekd"
    test: |
      system bin/"sekd", "version"
